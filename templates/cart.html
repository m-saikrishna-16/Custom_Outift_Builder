{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torendo | Cart</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  font-family: Assistant, Arial;
  margin: 0;
  background: #f5f5f6;
}

/* NAVBAR */
.navbar {
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
  border-bottom: 1px solid #ddd;
}

.brand-logo {
  font-size: 24px;
  font-weight: 800;
  text-decoration: none;
  color: #282c3f;
}

/* LAYOUT */
.cart-wrapper {
  max-width: 1100px;
  margin: 30px auto;
  display: flex;
  gap: 30px;
}

/* LEFT SIDE */
.cart-items {
  flex: 2;
}

/* RIGHT SIDE */
.cart-summary {
  flex: 1;
}

/* CARD */
.cart-item {
  display: flex;
  background: #fff;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 6px;
  position: relative;
}

.cart-item img {
  width: 110px;
  height: 140px;
  object-fit: cover;
}

.item-details {
  margin-left: 15px;
  flex: 1;
}

.item-title {
  font-weight: 600;
  margin-bottom: 5px;
}

.price {
  font-weight: bold;
  margin-bottom: 10px;
}

/* QTY FIXED (PROFESSIONAL) */
.qty-box {
  display: flex;
  align-items: center;
  gap: 10px;
}

.qty-btn {
  width: 32px;
  height: 32px;
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
  font-size: 18px;
}

.qty-number {
  min-width: 20px;
  text-align: center;
  font-weight: bold;
}

/* REMOVE */
.remove-btn {
  position: absolute;
  top: 10px;
  right: 15px;
  cursor: pointer;
}

/* SUMMARY */
.summary-card {
  background: #fff;
  padding: 20px;
}

.place-order-btn {
  width: 100%;
  padding: 14px;
  background: #0e7c06;
  color: #fff;
  border: none;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
}

.place-order-btn:hover {
  background: #0b5f04;
}

/* EMPTY */
.empty-cart {
  text-align: center;
  padding: 80px;
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="brand-logo">TORENDO</a>
</nav>

<div class="cart-wrapper">

  <div class="cart-items" id="cart-items"></div>
  <div class="cart-summary" id="cart-summary"></div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
  const items = document.getElementById("cart-items");
  const summary = document.getElementById("cart-summary");

  if (cart.length === 0) {
    items.innerHTML = `
      <div class="empty-cart">
        <h2>Your cart is empty 😢</h2>
        <a href="/products/">Go Shopping</a>
      </div>`;
    summary.innerHTML = "";
    return;
  }

  items.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    total += Number(item.price) * Number(item.quantity);

    items.innerHTML += `
      <div class="cart-item">
        <img src="${item.image}">
        <div class="item-details">
          <div class="item-title">${item.title}</div>
          <div class="price">₹${item.price}</div>

          <div class="qty-box">
            <button class="qty-btn" onclick="changeQty(${item.id}, -1)">-</button>
            <div class="qty-number">${item.quantity}</div>
            <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
          </div>
        </div>

        <div class="remove-btn" onclick="removeItem(${item.id})">
          ❌
        </div>
      </div>
    `;
  });

  summary.innerHTML = `
    <div class="summary-card">
      <h3>Total: ₹${total}</h3>
      <button class="place-order-btn" onclick="placeOrder()">PLACE ORDER</button>
    </div>
  `;
}

function changeQty(id, delta) {
  const item = cart.find(p => p.id === id);
  if (item) {
    item.quantity = Math.max(1, item.quantity + delta);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
  }
}

function removeItem(id) {
  cart = cart.filter(p => p.id !== id);
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCart();
}

/* ✅ FINAL FIXED ORDER */
function placeOrder() {
  fetch("/place_order/", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      cart: cart,
      name: "User"
    })
  })
  .then(res => res.json())
  .then(data => {
    if (data.message) {
      alert("Order placed successfully ✅");
      localStorage.removeItem("cart");
      window.location.href = "/order_success/";
    } else {
      alert("Error: " + data.error);
    }
  })
  .catch(err => {
    console.error(err);
    alert("Server error ❌");
  });
}

renderCart();
</script>

</body>
</html>
