{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmed | Torendo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #2ecc71;
            --primary-hover: #27ae60;
            --bg: #f8f9fa;
            --text-dark: #282c3f;
            --text-muted: #7e818c;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Assistant, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--white);
            max-width: 480px;
            width: 100%;
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .icon-circle {
            width: 90px;
            height: 90px;
            background: rgba(46, 204, 113, 0.1);
            color: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 30px;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s both;
        }

        @keyframes scaleIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-dark);
        }

        p.lead {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-main {
            display: block;
            width: 100%;
            padding: 16px;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .btn-main:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.2);
        }

        .support-link {
            margin-top: 30px;
            display: inline-block;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
        }

        .support-link:hover {
            color: #ff3f6c; /* Matching your Torendo brand accent */
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-circle">
            <i class="fas fa-check"></i>
        </div>

        <h1>Order Placed!</h1>
        <p class="lead">Success! We've received your order. A confirmation email with all the details has been sent to your inbox.</p>

        <a href="/products/" class="btn-main">Continue Shopping</a>

        <a href="/contact/" class="support-link">Having issues? Contact Support</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        window.onload = function() {
            confetti({
                particleCount: 120,
                spread: 70,
                origin: { y: 0.7 },
                colors: ['#2ecc71', '#27ae60', '#ff3f6c']
            });
        };
    </script>

</body>
</html>
