{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Torendo | Online Fashion Store</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <style>
    body {
      font-family: Assistant, Arial;
      background: #ffffff;
      margin: 0;
      color: #282c3f;
    }

    .navbar {
      height: 80px;
      display: flex;
      align-items: center;
      padding: 0 4%;
      box-shadow: 0 4px 12px 0 rgba(0,0,0,.05);
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1000;
    }

    .brand-logo {
      font-size: 24px;
      font-weight: 800;
      color: #282c3f;
      text-decoration: none;
    }

    .search-container {
      flex-grow: 1;
      max-width: 500px;
      margin: 0 40px;
      position: relative;
    }

    .search-container input {
      width: 100%;
      background: #f5f5f6;
      border-radius: 4px;
      padding: 10px 10px 10px 45px;
    }

    .search-container i {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
    }

    .products-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 30px;
      padding: 40px 2%;
    }

    .product-card {
      background: #fff;
      cursor: pointer;
      overflow: hidden;
      transition: 0.3s;
    }

    .product-card:hover {
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    .image-container {
      width: 100%;
      height: 250px;
      overflow: hidden;
    }

    .product-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .product-info {
      padding: 10px;
    }

    .discount-price {
      font-weight: bold;
    }

    .add-to-cart-btn {
      width: 100%;
      padding: 10px;
      background: #ff3f6c;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="brand-logo">TORENDO</a>

  <div class="search-container">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="productSearch" placeholder="Search..." onkeyup="filterProducts()">
  </div>
</nav>

<div class="products-container" id="product-list"></div>

<script>
let allProducts = [];

fetch("/get-products/")
  .then(res => res.json())
  .then(data => {
    console.log("Products:", data);  // 🔥 debug
    allProducts = data;
    displayProducts(allProducts);
  })
  .catch(err => {
    console.error("Error fetching products:", err);
  });

function displayProducts(products) {
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach(p => {

    // ✅ FIX IMAGE URL
    let imageUrl = p.image;

    if (!imageUrl) {
      imageUrl = "{% static 'images/default.png' %}";
    }

    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <div class="image-container">
        <img src="${imageUrl}" alt="${p.title}">
      </div>
      <div class="product-info">
        <h4>${p.title}</h4>
        <p>Rs. ${p.price}</p>
        <button class="add-to-cart-btn">Add to Cart</button>
      </div>
    `;

    container.appendChild(card);
  });
}

// Search
function filterProducts() {
  const term = document.getElementById("productSearch").value.toLowerCase();

  const filtered = allProducts.filter(p =>
    p.title.toLowerCase().includes(term)
  );

  displayProducts(filtered);
}
</script>

</body>
</html>
