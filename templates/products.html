{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torendo | Fashion Store</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
body {
  font-family: Assistant, Arial;
  margin: 0;
  background: #f5f5f6;
}

/* NAVBAR */
.navbar {
  height: 70px;
  display: flex;
  align-items: center;
  padding: 0 4%;
  background: #fff;
  box-shadow: 0 4px 12px rgba(0,0,0,.05);
}

.brand-logo {
  font-size: 24px;
  font-weight: 800;
  text-decoration: none;
  color: #282c3f;
}

.search-container {
  flex: 1;
  margin: 0 30px;
  position: relative;
}

.search-container input {
  width: 100%;
  padding: 10px 10px 10px 40px;
  background: #f5f5f6;
  border-radius: 4px;
  border: none;
}

.search-container i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
}

/* CART */
.cart-icon {
  position: relative;
  cursor: pointer;
}

.cart-count {
  position: absolute;
  top: -5px;
  right: -10px;
  background: red;
  color: #fff;
  font-size: 12px;
  padding: 2px 6px;
  border-radius: 50%;
}

/* LAYOUT */
.container {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  background: #fff;
  padding: 20px;
  border-right: 1px solid #ddd;
}

.sidebar h4 {
  margin-bottom: 10px;
}

.sidebar button {
  display: block;
  margin: 10px 0;
  padding: 8px;
  width: 100%;
  border: none;
  background: #eee;
  cursor: pointer;
}

.sidebar button:hover {
  background: #ddd;
}

/* PRODUCTS */
.products-container {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 25px;
  padding: 20px;
}

.product-card {
  background: #fff;
  transition: 0.3s;
  cursor: pointer;
}

.product-card:hover {
  box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  transform: translateY(-5px);
}

.image-container {
  height: 250px;
  overflow: hidden;
}

.product-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.product-info {
  padding: 10px;
}

.product-info h4 {
  margin: 5px 0;
}

.add-to-cart-btn {
  width: 100%;
  padding: 10px;
  background: #ff3f6c;
  color: white;
  border: none;
  cursor: pointer;
}

.add-to-cart-btn:hover {
  background: #e7335a;
}
</style>
</head>

<body>

<nav class="navbar">
  <a href="/" class="brand-logo">TORENDO</a>

  <div class="search-container">
    <i class="fa fa-search"></i>
    <input type="text" id="searchInput" placeholder="Search..." onkeyup="searchProduct()">
  </div>

  <div class="cart-icon" onclick="window.location.href='/cart/'">
    🛒
    <span class="cart-count" id="cart-count">0</span>
  </div>
</nav>

<div class="container">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h4>Filters</h4>

    <p>Price</p>
    <button onclick="filterPrice(500)">Below ₹500</button>
    <button onclick="filterPrice(1000)">Below ₹1000</button>
    <button onclick="resetFilters()">All</button>
  </div>

  <!-- PRODUCTS -->
  <div class="products-container" id="product-list"></div>

</div>

<script>
let allProducts = [];

// Fetch products
fetch("/get-products/")
  .then(res => res.json())
  .then(data => {
    allProducts = data;
    displayProducts(allProducts);
    updateCartCount();
  });

// Display products
function displayProducts(products) {
  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach(p => {
    let imageUrl = p.image || "{% static 'images/default.png' %}";

    const card = document.createElement("div");
    card.className = "product-card";

    card.innerHTML = `
      <div class="image-container">
        <img src="${imageUrl}">
      </div>
      <div class="product-info">
        <h4>${p.title}</h4>
        <p>₹${p.price}</p>
        <button class="add-to-cart-btn" onclick="addToCart(${p.id})">
          Add to Cart
        </button>
      </div>
    `;

    container.appendChild(card);
  });
}

// ADD TO CART
function addToCart(id) {
  const product = allProducts.find(p => p.id === id);

  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const existing = cart.find(item => item.id === id);

  if (existing) {
    existing.quantity += 1;
  } else {
    cart.push({
      id: product.id,
      title: product.title,
      price: product.price,
      image: product.image,
      quantity: 1
    });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();

  alert("Added to Cart ✅");
}

// CART COUNT
function updateCartCount() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  document.getElementById("cart-count").innerText = cart.length;
}

// FILTERS
function filterPrice(price) {
  const filtered = allProducts.filter(p => p.price <= price);
  displayProducts(filtered);
}

function resetFilters() {
  displayProducts(allProducts);
}

// SEARCH
function searchProduct() {
  const term = document.getElementById("searchInput").value.toLowerCase();
  const filtered = allProducts.filter(p =>
    p.title.toLowerCase().includes(term)
  );
  displayProducts(filtered);
}
</script>

</body>
</html>
